<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkMate 日志核查台</title>
    <style>
        /* ============================================================
           WorkMate 日志核查台 — 设计 token
           定调：EP 导管室的日志核查仪器。冷静、走纸感、mono 数据。
           ============================================================ */
        :root {
            --paper: #F2F5F7;          /* 页面底：冷灰蓝「关机监护屏」 */
            --surface: #FFFFFF;
            --ink: #1B2B3A;            /* 主文字：深墨蓝 */
            --ink-soft: #5B6B7A;
            --ink-faint: #8CA0AF;
            --pulse: #0E7C86;          /* 唯一主 accent：监护仪青 */
            --pulse-soft: #E3F1F2;
            --warn: #B7791F;           /* 告警琥珀 */
            --warn-soft: #FDF3E3;
            --alert: #B42318;          /* 倒退/漂移红 */
            --alert-soft: #FBEAE8;
            --grid: #D9E1E7;           /* 边线 / ECG 走纸格 */
            --mono: ui-monospace, 'Cascadia Mono', Consolas, 'SF Mono', monospace;
            --sans: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--sans);
            background: var(--paper);
            color: var(--ink);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }

        .container {
            display: flex;
            flex-direction: column;
            background: var(--surface);
            flex: 1;
            height: 100%;
            min-height: 0;
            overflow: hidden;
        }

        .view-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            height: 100%;
            min-height: 0;
        }

        .table-wrap {
            flex: 1;
            min-height: 0;
            overflow: auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ---------------- 仪表条（头部） ----------------
           底衬 1mm/5mm ECG 走纸格（全页唯一格纹，透明度压低）；
           右上角预留空间给 Flask 注入的「返回数据中心」浮层。 */
        .header {
            padding: 14px 170px 12px 22px;
            border-bottom: 1px solid var(--grid);
            background:
                linear-gradient(rgba(217, 225, 231, 0.28) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 225, 231, 0.28) 1px, transparent 1px),
                linear-gradient(rgba(217, 225, 231, 0.14) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 225, 231, 0.14) 1px, transparent 1px),
                var(--surface);
            background-size: 20px 20px, 20px 20px, 4px 4px, 4px 4px, auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .brand .eyebrow {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.22em;
            color: var(--pulse);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .brand h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 650;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.01em;
        }

        .badge-count {
            background: var(--pulse);
            color: white;
            padding: 1px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
        }

        /* 面包屑 */
        #navBreadcrumb {
            align-items: center;
            font-size: 13px;
            color: var(--ink-soft);
            background: var(--paper);
            padding: 4px 12px;
            border: 1px solid var(--grid);
            border-radius: 3px;
        }

        #navBreadcrumb .nav-link {
            cursor: pointer;
            color: var(--pulse);
            font-weight: 600;
        }

        #navCurrent {
            font-weight: 600;
            color: var(--ink);
        }

        /* 右侧 mono 读数排 */
        .stats-bar {
            display: flex;
            gap: 18px;
            align-items: baseline;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--ink-soft);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .stat-item .stat-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }

        .stat-item strong {
            color: var(--ink);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* ---------------- 操作区 ---------------- */
        .drop-zone {
            padding: 14px 22px;
            background: var(--surface);
            border-bottom: 1px solid var(--grid);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            transition: background 0.2s;
        }

        .zone-hint {
            color: var(--ink-soft);
            font-size: 13px;
            margin-left: 10px;
        }

        .zone-hint b {
            font-family: var(--mono);
            font-weight: 600;
            font-size: 12px;
        }

        #modeIndicator {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint);
            margin-top: 2px;
        }

        /* 按钮 */
        .btn-action {
            padding: 6px 14px;
            border-radius: 3px;
            border: 1px solid var(--grid);
            background: var(--surface);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--sans);
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--ink);
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            font-weight: 500;
            height: 32px;
        }

        .btn-action:hover:not(:disabled) {
            border-color: var(--pulse);
            color: var(--pulse);
            background: var(--pulse-soft);
        }

        .btn-action:focus-visible,
        .btn-page:focus-visible,
        .search-box:focus-visible,
        .checkbox-wrapper:focus-within {
            outline: 2px solid var(--pulse);
            outline-offset: 1px;
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--pulse);
            color: white;
            border-color: var(--pulse);
        }

        .btn-primary:hover:not(:disabled) {
            background: #0A626A;
            border-color: #0A626A;
            color: white;
        }

        .btn-green {
            color: var(--pulse);
            border-color: var(--pulse);
        }

        .btn-green:hover:not(:disabled) {
            background: var(--pulse-soft);
        }

        .search-box {
            width: 200px;
            padding: 6px 12px;
            border: 1px solid var(--grid);
            border-radius: 3px;
            font-size: 13px;
            font-family: var(--sans);
            height: 32px;
            background: var(--surface);
            color: var(--ink);
        }

        .search-box::placeholder {
            color: var(--ink-faint);
        }

        /* ---------------- 过滤条 ---------------- */
        .filter-bar {
            padding: 10px 22px;
            background: var(--paper);
            border-bottom: 1px solid var(--grid);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-right: 5px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 3px;
            border: 1px solid var(--grid);
            font-size: 12px;
            font-family: var(--mono);
            cursor: pointer;
            user-select: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .checkbox-wrapper:hover {
            border-color: var(--pulse);
        }

        .checkbox-wrapper.active {
            background: var(--pulse-soft);
            color: var(--pulse);
            border-color: var(--pulse);
        }

        .checkbox-wrapper.hit {
            background: var(--alert-soft);
            color: var(--alert);
            border-color: var(--alert);
            animation: pulse-alert 2s infinite;
        }

        @keyframes pulse-alert {
            0% { box-shadow: 0 0 0 0 rgba(180, 35, 24, 0.25); }
            70% { box-shadow: 0 0 0 4px rgba(180, 35, 24, 0); }
            100% { box-shadow: 0 0 0 0 rgba(180, 35, 24, 0); }
        }

        .checkbox-wrapper input {
            display: none;
        }

        /* ---------------- Toast ---------------- */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--ink);
            color: white;
            padding: 10px 20px;
            border-radius: 3px;
            font-size: 13px;
            box-shadow: 0 4px 12px rgba(27, 43, 58, 0.25);
            animation: toast-in 0.25s ease-out, toast-out 0.25s ease-in 2.75s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes toast-in {
            from { transform: translateY(-16px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes toast-out {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-16px); opacity: 0; }
        }

        /* ---------------- 表格 ---------------- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--paper);
            box-shadow: 0 1px 0 var(--grid);
        }

        th {
            padding: 9px 14px;
            text-align: left;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink-soft);
            border-bottom: 1px solid var(--grid);
            white-space: nowrap;
        }

        th.sortable {
            cursor: pointer;
            position: relative;
            padding-right: 25px;
            transition: color 0.15s;
        }

        th.sortable:hover {
            color: var(--pulse);
        }

        th.sortable::after {
            content: '↕';
            position: absolute;
            right: 8px;
            color: var(--ink-faint);
            font-size: 10px;
        }

        th.sortable.asc::after {
            content: '↑';
            color: var(--pulse);
        }

        th.sortable.desc::after {
            content: '↓';
            color: var(--pulse);
        }

        td {
            padding: 7px 14px;
            border-bottom: 1px solid var(--grid);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tbody tr:hover {
            background: var(--pulse-soft);
        }

        .col-idx {
            width: 46px;
            color: var(--ink-faint);
            text-align: center;
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
        }

        .col-time {
            width: 100px;
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        .col-group {
            width: 110px;
        }

        .col-msg {
            width: auto;
        }

        /* 分组 tag：统一低饱和底 + 分组色只用于文字，压住花色 */
        .tag {
            padding: 2px 7px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--paper);
            border: 1px solid var(--grid);
            color: var(--ink-soft);
        }

        .tag-PACE { color: #A15C07; border-color: #E8CFA8; }
        .tag-EVENT { color: #9D174D; border-color: #ECC7D7; }
        .tag-NOTE { color: #1A7F37; border-color: #BFE3CB; }
        .tag-PROTOCOL { color: var(--pulse); border-color: #B5D9DC; }

        /* ---------------- 徽标 ---------------- */
        .chip {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            font-family: var(--mono);
            margin-left: 6px;
            white-space: nowrap;
            vertical-align: 1px;
        }

        .chip-new { background: var(--pulse-soft); color: var(--pulse); }
        .chip-ok { background: #E4F3E9; color: #1A7F37; }
        .chip-cache { background: var(--paper); color: var(--ink-faint); }
        .chip-warn { background: var(--warn-soft); color: var(--warn); }
        .chip-drift { background: var(--alert-soft); color: var(--alert); }

        /* 时间异常行 */
        tr.row-warn td {
            background: var(--warn-soft);
        }

        tr.row-warn td.col-time {
            color: var(--warn);
        }

        /* 时间轴微条（signature）：日志时间戳映射为刻度，异常加高变色 */
        .timeline-strip {
            display: block;
        }

        .timeline-strip.clickable {
            cursor: crosshair;
        }

        /* ---------------- 底部与分页 ---------------- */
        .footer {
            padding: 9px 20px;
            border-top: 1px solid var(--grid);
            background: var(--paper);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-page {
            padding: 5px 12px;
            border: 1px solid var(--grid);
            background: var(--surface);
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            color: var(--ink-soft);
            font-family: var(--mono);
        }

        .btn-page:hover:not(:disabled) {
            border-color: var(--pulse);
            color: var(--pulse);
        }

        .btn-page:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            background: var(--paper);
        }

        .page-info {
            font-size: 12px;
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
            min-width: 140px;
            text-align: center;
            color: var(--ink-soft);
        }

        /* ---------------- 存储横幅 ---------------- */
        #storageBanner {
            display: none;
            padding: 8px 22px;
            background: var(--warn-soft);
            color: var(--warn);
            font-size: 13px;
            border-bottom: 1px solid #EBD9B4;
        }

        /* ---------------- 诊断抽屉（默认收起，出错自动展开） ---------------- */
        #consoleDrawer {
            border-top: 1px solid var(--grid);
            background: #14212B;
            flex-shrink: 0;
        }

        #consoleToggle {
            width: 100%;
            border: none;
            background: transparent;
            color: #7FA3B5;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-align: left;
            padding: 6px 22px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        #consoleToggle:hover {
            color: #B8D4E0;
        }

        #consoleBody {
            display: none;
            padding: 4px 22px 10px;
            max-height: 150px;
            overflow: auto;
        }

        #consoleDrawer.open #consoleBody {
            display: block;
        }

        #sysLog {
            white-space: pre-wrap;
            color: #9FBFA8;
            font-family: var(--mono);
            font-size: 11px;
            line-height: 1.5;
        }

        /* ---------------- 漂移冲突弹层 ---------------- */
        #conflictOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(27, 43, 58, 0.55);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        #conflictModal {
            background: var(--surface);
            border-radius: 4px;
            border-top: 3px solid var(--alert);
            max-width: 720px;
            width: 92%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(15, 27, 39, 0.35);
        }

        #conflictModal .modal-head {
            padding: 14px 20px;
            border-bottom: 1px solid var(--grid);
            font-weight: 700;
            color: var(--alert);
        }

        #conflictModal .modal-body {
            padding: 10px 20px;
            overflow: auto;
        }

        #conflictModal .modal-foot {
            padding: 12px 20px;
            border-top: 1px solid var(--grid);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .conflict-item {
            border: 1px solid #EFC7C2;
            background: var(--alert-soft);
            border-radius: 4px;
            padding: 10px 14px;
            margin: 8px 0;
            font-size: 13px;
        }

        .conflict-item .diff-line {
            font-family: var(--mono);
            font-size: 12px;
            color: #7A1B12;
            margin: 2px 0;
        }

        .conflict-item .actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        /* ---------------- 动效收敛 ---------------- */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div style="display:flex; align-items:center; gap:16px;">
                <div class="brand">
                    <div class="eyebrow">WorkMate · entries.log</div>
                    <h1>日志核查台 <span class="badge-count" id="countBadge">0</span></h1>
                </div>
                <!-- Breadcrumb Navigation -->
                <div id="navBreadcrumb" style="display:none;">
                    <span class="nav-link" id="navHome">首页列表</span>
                    <span style="margin:0 8px;">/</span>
                    <span id="navCurrent">-</span>
                </div>
            </div>
            <div id="toast-container"></div>
            <div class="stats-bar">
                <span class="stat-item"><span class="stat-label">患者</span><strong
                        id="statPatientCount">-</strong></span>
                <span class="stat-item"><span class="stat-label">时间范围</span><strong
                        id="statTimeRange">-</strong></span>
                <span class="stat-item"><span class="stat-label">存储</span><strong id="cacheState">-</strong></span>
                <span class="stat-item"><span class="stat-label">模式</span><strong id="modeState">-</strong></span>
            </div>
        </div>

        <!-- 存储降级提示 -->
        <div id="storageBanner">⚠️ 本浏览器环境无法使用内嵌数据库（IndexedDB），本次导入的数据在刷新后将丢失。</div>

        <!-- VIEW 1: DASHBOARD (Patient List) -->
        <div id="view-dashboard" class="view-container">

            <!-- Scan / Import Zone -->
            <div class="drop-zone" id="dashDropZone">
                <input type="file" id="fileInput" accept=".log" multiple style="display:none">
                <input type="file" id="folderInput" webkitdirectory style="display:none">

                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <button id="btnAutoScan" class="btn-action btn-primary"
                        style="height:36px; padding:0 20px; display:none;">一键扫描</button>
                    <button id="btnChangeRoot" class="btn-action" style="height:36px; display:none;"
                        title="重新选择扫描根目录">更换目录</button>
                    <button id="btnSingle" class="btn-action" style="height:36px;">导入单文件</button>
                    <button id="btnScan" class="btn-action" style="height:36px;">导入文件夹</button>
                    <div class="zone-hint">
                        支持整个文件夹拖入此区域，自动配对同目录下的 <b>MASTER</b> 与 <b>entries.log</b>
                        <div id="modeIndicator"></div>
                    </div>
                </div>

                <div id="dashSearchGroup" style="margin-left:auto; display:none; gap:10px;">
                    <input type="text" id="contentSearch" class="search-box" style="width:200px;"
                        placeholder="深搜日志内容…">
                    <input type="text" id="dashSearch" class="search-box" style="width:200px;"
                        placeholder="搜索姓名 / ID / 日期…">
                    <button id="btnClearCache" class="btn-action" title="删除内嵌数据库中的全部缓存数据">清空缓存</button>
                </div>
            </div>

            <div class="table-wrap">
                <table id="dashTable">
                    <thead>
                        <tr>
                            <th style="width:46px;">#</th>
                            <th style="width:170px;">病人姓名</th>
                            <th style="width:110px;">病人 ID</th>
                            <th style="width:110px;">操作日期</th>
                            <th style="width:70px;">日志数</th>
                            <th style="width:150px;" title="日志时间戳分布：刻度密度即手术节奏，琥珀/红色为时间异常">手术节奏</th>
                            <th>数据源路径</th>
                            <th style="width:110px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dashBody">
                        <tr>
                            <td colspan="8" style="text-align:center; padding:60px; color:var(--ink-faint);">
                                <div style="font-family:var(--mono); font-size:12px; letter-spacing:0.1em; margin-bottom:8px;">
                                    NO DATA</div>
                                <div>点击上方按钮，或将数据文件夹拖入此窗口开始</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 诊断抽屉（默认收起，出错自动展开） -->
            <div id="consoleDrawer">
                <button id="consoleToggle" type="button">
                    <span>诊断日志 · SYSTEM LOG</span>
                    <span id="consoleToggleState">展开 ▸</span>
                </button>
                <div id="consoleBody">
                    <div style="text-align:right; margin-bottom:4px;">
                        <button id="btnConsoleClear"
                            style="font-size:10px; cursor:pointer; background:transparent; border:1px solid #3A5060; color:#7FA3B5; border-radius:3px; padding:2px 10px;">清空</button>
                    </div>
                    <div id="sysLog">Ready.</div>
                </div>
            </div>
        </div>

        <!-- VIEW 2: DETAIL (Log Entries) -->
        <div id="view-detail" class="view-container" style="display:none;">
            <div class="filter-bar" id="filterBar" style="display:none;">
                <button id="btnBack" class="btn-action" style="margin-right:10px;">← 返回列表</button>
                <div style="width:1px; height:20px; background:#e2e8f0; margin:0 10px;"></div>
                <span class="filter-label">过滤:</span>
                <div id="filterGroup" style="display:flex; gap:10px; flex-wrap:wrap;"></div>

                <div style="margin-left:auto; display:flex; gap:10px;">
                    <input type="text" id="logSearch" class="search-box" placeholder="搜索日志内容...">
                    <button id="btnCsv" class="btn-action">导出 CSV</button>
                    <button id="btnXls" class="btn-action btn-green">导出 XLS</button>
                </div>
            </div>

            <!-- 放大版时间轴：点击跳转到对应日志行 -->
            <div id="detailTimeline"
                style="display:none; padding:8px 22px 4px; border-bottom:1px solid var(--grid); background:var(--surface);">
            </div>

            <div class="table-wrap">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th class="col-idx">#</th>
                            <th class="col-time sortable" data-sort="ts">时间 (Time)</th>
                            <th class="col-group sortable" data-sort="group">类型</th>
                            <th class="col-msg sortable" data-sort="msg">内容 (Annotation)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Logs go here -->
                    </tbody>
                </table>
            </div>

            <div class="footer">
                <button class="btn-page" id="btnPrev" disabled>‹</button>
                <span class="page-info" id="pageInfo">Page 1 / 1</span>
                <button class="btn-page" id="btnNext" disabled>›</button>
                <button class="btn-page" id="btnLast" disabled>»</button>
            </div>
        </div>

        <!-- 漂移冲突确认弹层 -->
        <div id="conflictOverlay">
            <div id="conflictModal">
                <div class="modal-head">⚠️ 检测到数据漂移，请核实</div>
                <div class="modal-body" id="conflictBody"></div>
                <div class="modal-foot">
                    <button id="btnConflictKeepAll" class="btn-action">全部保留库中版本</button>
                    <button id="btnConflictOverwriteAll" class="btn-action btn-primary">全部覆盖为新版</button>
                </div>
            </div>
        </div>

        <script>
            'use strict';

            // ================================================================
            // 1. constants
            // ================================================================
            const GROUP_MAP = { 1: 'PROTOCOL', 2: 'EVENT', 3: 'NOTE', 4: 'IDK', 5: 'HIDDEN_NOTE', 6: 'PACE', 17: 'RATE' };
            const DEFAULT_HIDDEN = new Set(['SYS', 'IDK', 'UNK', 'ERROR', 'UNKNOWN', 'HIDDEN_NOTE', 'DEBUG']);
            const PAGE_SIZE = 100;

            // entries.log 二进制版式（默认目标设备版本 4.3.2，向下兼容 V3 结构）
            const LOG_SPECS = {
                x64: { head: 36, line: 220, tsOff: 10, txtOff: 18, txtLen: 176 },
                x32: { head: 32, line: 216, tsOff: 10, txtOff: 14, txtLen: 178 },
            };

            // 时间异常判据（阈值可按需调整；告警文案会写明判据，由核查者裁断）
            const TS_BACKWARD_MS = 1000;                       // 倒退超 1s（同秒抖动放过）
            const TS_JUMP_MS = 6 * 3600 * 1000;                // 相邻跳变超 6h
            const TS_CROSS_DAY_MIN_MS = 3600 * 1000;           // 跨自然日且间隔超 1h 才算跳变（放过跨午夜连续记录）
            const TS_VERSION_SUSPECT_MS = 30 * 24 * 3600 * 1000; // 相邻差超 30 天：疑似 x64/x32 版式误判
            const TS_MIN_VALID = Date.UTC(1995, 0, 1);         // 早于 1995 视为非法

            // 内嵌数据库
            const DB_NAME = 'workmate_log_parser';
            const DB_VERSION = 1;

            // ================================================================
            // 2. utils
            // ================================================================
            function debounce(func, wait) {
                let timeout;
                return function (...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), wait);
                };
            }

            function log(msg) {
                console.log(msg);
                const el = document.getElementById('sysLog');
                if (el) {
                    el.innerText += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
                    el.scrollTop = el.scrollHeight;
                }
                // 错误自动展开诊断抽屉
                if (String(msg).indexOf('❌') !== -1) setConsoleOpen(true);
            }

            function setConsoleOpen(open) {
                const drawer = document.getElementById('consoleDrawer');
                const state = document.getElementById('consoleToggleState');
                if (!drawer) return;
                drawer.classList.toggle('open', open);
                if (state) state.textContent = open ? '收起 ▾' : '展开 ▸';
            }

            function showToast(msg, icon = "💡") {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';

                const iconSpan = document.createElement('span');
                iconSpan.textContent = icon;
                const msgSpan = document.createElement('span');
                msgSpan.textContent = msg;

                toast.appendChild(iconSpan);
                toast.appendChild(msgSpan);
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3100);
            }

            // HTML escape
            function h(str) {
                if (!str) return "";
                return String(str).replace(/[&<>"']/g, m => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[m]));
            }

            // 跨平台路径规范化：反斜杠 → 正斜杠
            function normalizePath(p) {
                if (!p) return "";
                return p.replace(/\\/g, '/');
            }

            // ================================================================
            // 3. parser（纯函数，不触 DOM/状态；node harness 依赖此契约）
            // ================================================================

            // MASTER：姓名 0x02/64B、ID 0x43/16B；对短文件做长度钳制而非直接抛错
            function parseMaster(buffer) {
                if (buffer.byteLength < 0x4F) return {};

                function readCStr(offset, maxLen) {
                    const avail = Math.max(0, Math.min(maxLen, buffer.byteLength - offset));
                    const bytes = new Uint8Array(buffer, offset, avail);
                    let out = "";
                    for (let i = 0; i < bytes.length; i++) {
                        if (bytes[i] === 0) break;
                        out += String.fromCharCode(bytes[i]);
                    }
                    return out.trim();
                }

                return { name: readCStr(0x02, 64), id: readCStr(0x43, 16) };
            }

            function detectLogSpec(fileSize) {
                const rem64 = (fileSize - LOG_SPECS.x64.head) % LOG_SPECS.x64.line;
                const rem32 = (fileSize - LOG_SPECS.x32.head) % LOG_SPECS.x32.line;
                if (rem64 === 0) return LOG_SPECS.x64;
                if (rem32 === 0) return LOG_SPECS.x32;
                // 容错：不能整除时取余数最小的版本
                log(`⚠️ 文件大小 (${fileSize}) 不标准。尝试根据最接近版本解析。rem64=${rem64}, rem32=${rem32}`);
                return (rem64 <= rem32) ? LOG_SPECS.x64 : LOG_SPECS.x32;
            }

            function parseLogBuffer(buffer) {
                const view = new DataView(buffer);
                const rows = [];
                let detectedDate = null;
                const fileSize = buffer.byteLength;
                const spec = detectLogSpec(fileSize);
                const decoder = new TextDecoder('iso-8859-1');

                for (let ptr = spec.head; ptr < fileSize; ptr += spec.line) {
                    if (ptr + spec.line > fileSize) break;

                    const row = { ts: 0, timeStr: '', group: 'UNK', msg: '' };
                    try {
                        const gid = view.getUint16(ptr, true);
                        if (gid === 5 || gid === 8) continue; // 过滤 HIDDEN_NOTE (5) 和 UNK (8)
                        row.group = GROUP_MAP[gid] || `UNK(${gid})`;
                        const ts = (spec === LOG_SPECS.x64)
                            ? Number(view.getBigUint64(ptr + spec.tsOff, true))
                            : view.getUint32(ptr + spec.tsOff, true) * 1000;
                        row.ts = ts;

                        if (ts > 0 && ts < 4102444800000) {
                            const d = new Date(ts);
                            row.timeStr = d.toLocaleTimeString('en-GB', { hour12: false });
                            if (!detectedDate) detectedDate = d.toLocaleDateString('zh-CN');
                        }

                        let textBytes = new Uint8Array(buffer, ptr + spec.txtOff, spec.txtLen);
                        // 截断至 null 终止符（与 Python 端逻辑一致）
                        const nullIdx = textBytes.indexOf(0);
                        if (nullIdx >= 0) textBytes = textBytes.subarray(0, nullIdx);

                        const rawText = decoder.decode(textBytes);
                        row.msg = rawText.replace(/[^\x20-\x7E\t]/g, '').trim();

                        if (row.msg) {
                            rows.push(row);
                        }
                    } catch (err) {
                        // 跳过损坏行
                        if (rows.length < 10) log(`⚠️ Line skip at ${ptr}: ${err.message}`);
                    }
                }
                return { rows: rows, date: detectedDate };
            }

            // 按文件物理顺序检测时间戳异常，给 row 打 flags 并汇总到 study 级
            function detectTimeAnomalies(rows) {
                const anomalies = { backward: 0, jump: 0, invalid: 0, total: 0, firstIdx: -1, versionSuspect: false };
                const upperBound = Date.now() + 24 * 3600 * 1000;
                let prev = null;

                rows.forEach((r, i) => {
                    r.flags = [];
                    const valid = r.ts > TS_MIN_VALID && r.ts < upperBound;
                    if (!valid) {
                        r.flags.push('ts_invalid');
                        anomalies.invalid++;
                    } else {
                        if (prev !== null) {
                            const d = r.ts - prev;
                            const crossDay = new Date(prev).toDateString() !== new Date(r.ts).toDateString();
                            if (d < -TS_BACKWARD_MS) {
                                r.flags.push('ts_backward');
                                anomalies.backward++;
                            } else if (d > TS_JUMP_MS || (crossDay && d > TS_CROSS_DAY_MIN_MS)) {
                                r.flags.push('ts_jump');
                                anomalies.jump++;
                            }
                            if (Math.abs(d) > TS_VERSION_SUSPECT_MS) anomalies.versionSuspect = true;
                        }
                        prev = r.ts;
                    }
                    if (r.flags.length && anomalies.firstIdx < 0) anomalies.firstIdx = i;
                });

                anomalies.total = anomalies.backward + anomalies.jump + anomalies.invalid;
                return anomalies;
            }

            // 内容哈希：entries 字节 ∥ 0x00 ∥ master 字节。
            // 首选 SHA-256（Chromium file:// 属 secure context 可用），
            // 否则回退纯 JS FNV-1a 64-bit；记录算法名，算法不同不比哈希。
            async function hashContent(entriesBuf, masterBuf) {
                const eLen = entriesBuf ? entriesBuf.byteLength : 0;
                const mLen = masterBuf ? masterBuf.byteLength : 0;
                const joined = new Uint8Array(eLen + 1 + mLen);
                if (entriesBuf) joined.set(new Uint8Array(entriesBuf), 0);
                joined[eLen] = 0;
                if (masterBuf) joined.set(new Uint8Array(masterBuf), eLen + 1);

                if (typeof crypto !== 'undefined' && crypto.subtle && crypto.subtle.digest) {
                    try {
                        const digest = await crypto.subtle.digest('SHA-256', joined);
                        const hex = Array.from(new Uint8Array(digest))
                            .map(b => b.toString(16).padStart(2, '0')).join('');
                        return { hash: hex, algo: 'sha256' };
                    } catch (e) { /* 落入 FNV 回退 */ }
                }

                let hashState = 0xcbf29ce484222325n;
                const prime = 0x100000001b3n;
                const mask = 0xffffffffffffffffn;
                for (let i = 0; i < joined.length; i++) {
                    hashState = ((hashState ^ BigInt(joined[i])) * prime) & mask;
                }
                return { hash: hashState.toString(16).padStart(16, '0'), algo: 'fnv1a64' };
            }

            // 输入统一化：File/Blob 或 ArrayBuffer（Flask 模式 b64 解码产物）
            async function toArrayBuffer(x) {
                if (!x) return null;
                if (x instanceof ArrayBuffer) return x;
                return await x.arrayBuffer();
            }

            async function parseStudy(path, logFile, masterFile) {
                const study = {
                    id: Math.random().toString(36).substr(2, 9),
                    path: path,
                    name: "Unknown",
                    pid: "-",
                    date: "-",
                    ts: 0,
                    rows: [],
                    anomalies: null,
                    contentHash: null,
                    hashAlgo: null
                };

                let logBuf = null, masterBuf = null;
                try {
                    logBuf = await toArrayBuffer(logFile);
                } catch (e) { log(`⚠️ entries.log 读取失败 (${path}): ${e.message}`); }
                try {
                    masterBuf = await toArrayBuffer(masterFile);
                } catch (e) { log(`⚠️ MASTER 读取失败 (${path}): ${e.message}`); }

                if (masterBuf) {
                    try {
                        const info = parseMaster(masterBuf);
                        if (info.name) study.name = info.name;
                        if (info.id) study.pid = info.id;
                    } catch (e) { log(`⚠️ MASTER 解析失败 (${path}): ${e.message}`); }
                }

                if (logBuf) {
                    try {
                        const res = parseLogBuffer(logBuf);
                        study.rows = res.rows;
                        if (res.date) {
                            study.date = res.date;
                            study.ts = new Date(res.date).getTime();
                        }
                    } catch (e) { log(`⚠️ entries.log 解析失败 (${path}): ${e.message}`); }
                }

                study.anomalies = detectTimeAnomalies(study.rows);
                if (study.anomalies.versionSuspect) {
                    log(`⚠️ ${path}: 相邻时间戳差超过 30 天，疑似 x64/x32 版式误判，请人工核实。`);
                }

                const hashed = await hashContent(logBuf, masterBuf);
                study.contentHash = hashed.hash;
                study.hashAlgo = hashed.algo;

                return study;
            }

            // ================================================================
            // 4. storage：IndexedDB 持久化（不可用时降级为内存态）
            // ================================================================
            let db = null; // null = 内存降级模式

            function openDB() {
                return new Promise((resolve) => {
                    if (typeof indexedDB === 'undefined') { resolve(null); return; }
                    let req;
                    try {
                        req = indexedDB.open(DB_NAME, DB_VERSION);
                    } catch (e) { resolve(null); return; }
                    req.onupgradeneeded = (e) => {
                        const d = e.target.result;
                        if (!d.objectStoreNames.contains('studies')) d.createObjectStore('studies', { keyPath: 'key' });
                        if (!d.objectStoreNames.contains('handles')) d.createObjectStore('handles');
                        // 注：schema 版本由 IndexedDB 自身的 DB_VERSION 机制承担，
                        // 无需额外 meta store（曾建过空 store，无消费者，已移除）
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                    req.onblocked = () => resolve(null);
                });
            }

            // 单次事务包装；db 不可用时 resolve(undefined)
            function idbOp(store, mode, fn) {
                return new Promise((resolve, reject) => {
                    if (!db) { resolve(undefined); return; }
                    let tx;
                    try {
                        tx = db.transaction(store, mode);
                    } catch (e) { resolve(undefined); return; }
                    const req = fn(tx.objectStore(store));
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            // 读/删失败降级为"无记录"并写诊断日志——不能让一条损坏记录
            // 把整条 ingest 链变成 unhandled rejection、加载态永久卡死
            function idbFail(op, store) {
                return (e) => {
                    log(`❌ 数据库${op}失败 (${store}): ${e && e.name}: ${e && e.message}`);
                    return undefined;
                };
            }

            const idbGet = (store, key) =>
                idbOp(store, 'readonly', s => s.get(key)).catch(idbFail('读取', store));
            const idbGetAll = (store) =>
                idbOp(store, 'readonly', s => s.getAll()).catch(idbFail('读取', store));
            const idbDelete = (store, key) =>
                idbOp(store, 'readwrite', s => s.delete(key)).catch(idbFail('删除', store));
            const idbClear = (store) =>
                idbOp(store, 'readwrite', s => s.clear()).catch(idbFail('清空', store));

            async function idbPut(store, val, key) {
                try {
                    return await idbOp(store, 'readwrite',
                        s => (key !== undefined) ? s.put(val, key) : s.put(val));
                } catch (e) {
                    // 配额超限等写入失败必须可见，不静默吞掉
                    log(`❌ 数据库写入失败 (${store}): ${e && e.name}: ${e && e.message}`);
                    if (e && e.name === 'QuotaExceededError') {
                        showToast('数据库空间不足，请清理部分缓存后重试', '❌');
                    }
                    return undefined;
                }
            }

            // 规范化路径 key：统一分隔符 + NFC + 去尾斜杠 + 小写（Windows 不区分大小写）
            function studyKey(path) {
                return normalizePath(path).normalize('NFC').replace(/\/+$/, '').toLowerCase();
            }

            // 持久化裁剪：只保留可结构化克隆且必要的字段
            function packStudy(s) {
                return {
                    key: s.key,
                    displayPath: s.path,
                    name: s.name,
                    pid: s.pid,
                    date: s.date,
                    ts: s.ts,
                    rows: s.rows,
                    rowCount: s.rows.length,
                    contentHash: s.contentHash,
                    hashAlgo: s.hashAlgo,
                    anomalies: s.anomalies,
                    source: s.source || '',
                    savedAt: s.savedAt || Date.now(),
                    verifiedAt: s.verifiedAt || null,
                    driftSeenAt: s.driftSeenAt || null
                };
            }

            function unpackStudy(rec, status) {
                return {
                    id: Math.random().toString(36).substr(2, 9),
                    key: rec.key,
                    path: rec.displayPath,
                    name: rec.name,
                    pid: rec.pid,
                    date: rec.date,
                    ts: rec.ts,
                    rows: rec.rows || [],
                    anomalies: rec.anomalies || null,
                    contentHash: rec.contentHash,
                    hashAlgo: rec.hashAlgo,
                    savedAt: rec.savedAt,
                    verifiedAt: rec.verifiedAt,
                    driftSeenAt: rec.driftSeenAt,
                    status: status || 'cached'
                };
            }

            async function restoreFromDB() {
                const recs = await idbGetAll('studies');
                if (!recs || !recs.length) return 0;
                for (const rec of recs) upsertStudy(unpackStudy(rec, 'cached'));
                appData.studies.sort((a, b) => b.ts - a.ts);
                renderDashboard();
                const sg = document.getElementById('dashSearchGroup');
                if (sg) sg.style.display = 'flex';
                return recs.length;
            }

            async function initStorage() {
                db = await openDB();
                const cacheState = document.getElementById('cacheState');
                if (!db) {
                    const banner = document.getElementById('storageBanner');
                    if (banner) banner.style.display = 'block';
                    if (cacheState) { cacheState.textContent = '内存(易失)'; cacheState.title = 'IndexedDB 不可用，刷新后数据丢失'; }
                    log('⚠️ IndexedDB 不可用，本次数据仅保存在内存中，刷新即丢失。');
                    return;
                }
                if (cacheState) {
                    cacheState.textContent = '持久化';
                    cacheState.title = '数据保存在本浏览器的 IndexedDB 中；file:// 与本地服务两种打开方式的缓存相互独立';
                }
                const n = await restoreFromDB();
                if (n > 0) showToast(`已从内嵌数据库恢复 ${n} 条患者日志缓存`, '💾');
            }

            // ================================================================
            // 5. drift：重扫比对（默认不自动覆盖，漂移必须人工核实）
            // ================================================================
            function upsertStudy(s) {
                const idx = appData.studies.findIndex(x => x.key === s.key);
                if (idx >= 0) appData.studies[idx] = s;
                else appData.studies.push(s);
            }

            // 同算法比哈希；算法不同（跨浏览器换了实现）退化为字段级比对
            function isSameContent(oldRec, fresh) {
                if (oldRec.hashAlgo === fresh.hashAlgo) {
                    return oldRec.contentHash === fresh.contentHash;
                }
                const oldCount = (oldRec.rowCount !== undefined) ? oldRec.rowCount : (oldRec.rows || []).length;
                return oldCount === fresh.rows.length &&
                    oldRec.name === fresh.name &&
                    oldRec.pid === fresh.pid &&
                    oldRec.date === fresh.date;
            }

            function diffStudies(oldRec, fresh) {
                const diffs = [];
                const shortHash = x => (x || '').substring(0, 12);
                const oldCount = (oldRec.rowCount !== undefined) ? oldRec.rowCount : (oldRec.rows || []).length;
                if (oldCount !== fresh.rows.length) diffs.push(`日志行数: ${oldCount} → ${fresh.rows.length}`);
                if (oldRec.name !== fresh.name) diffs.push(`患者姓名: ${oldRec.name} → ${fresh.name}`);
                if (oldRec.pid !== fresh.pid) diffs.push(`患者 ID: ${oldRec.pid} → ${fresh.pid}`);
                if (oldRec.date !== fresh.date) diffs.push(`操作日期: ${oldRec.date} → ${fresh.date}`);
                if (oldRec.hashAlgo === fresh.hashAlgo && oldRec.contentHash !== fresh.contentHash) {
                    diffs.push(`内容哈希 (${fresh.hashAlgo}): ${shortHash(oldRec.contentHash)}… → ${shortHash(fresh.contentHash)}…`);
                }
                if (oldRec.hashAlgo !== fresh.hashAlgo) {
                    diffs.push(`哈希算法变更 (${oldRec.hashAlgo} → ${fresh.hashAlgo})，已按字段比对`);
                }
                return diffs;
            }

            // 统一入库：新解析的 study 列表与库中版本比对后合入 appData
            async function ingestStudies(freshList, sourceLabel) {
                const conflicts = [];
                let added = 0, refreshed = 0;
                for (const s of freshList) {
                    s.key = studyKey(s.path);
                    // 单文件导入没有目录身份，同名不同源文件会互相碰撞并触发伪漂移；
                    // 以内容哈希做身份：同文件重导去重，不同文件各自成条
                    if (s.path.indexOf('Single/') === 0) {
                        s.key += '#' + (s.contentHash || '').substring(0, 12);
                    }
                    s.source = sourceLabel || '';
                    const old = await idbGet('studies', s.key);
                    if (!old) {
                        s.status = 'new';
                        s.savedAt = Date.now();
                        added++;
                        await idbPut('studies', packStudy(s));
                        upsertStudy(s);
                    } else if (isSameContent(old, s)) {
                        s.status = 'verified';
                        s.savedAt = old.savedAt;
                        s.verifiedAt = Date.now();
                        refreshed++;
                        await idbPut('studies', packStudy(s)); // 刷新 verifiedAt（换算法时同时升级哈希）
                        upsertStudy(s);
                    } else {
                        // 漂移：列表先保留库中版本并标记，等用户在弹层里裁决
                        const kept = unpackStudy(old, 'drift');
                        conflicts.push({ key: s.key, oldRec: old, fresh: s, diffs: diffStudies(old, s) });
                        upsertStudy(kept);
                    }
                }
                appData.studies.sort((a, b) => b.ts - a.ts);
                if (conflicts.length) showConflictModal(conflicts);
                return { conflicts, added, refreshed };
            }

            let pendingConflicts = [];

            async function resolveConflict(c, overwrite) {
                if (overwrite) {
                    c.fresh.status = 'updated';
                    c.fresh.savedAt = Date.now();
                    c.fresh.verifiedAt = Date.now();
                    await idbPut('studies', packStudy(c.fresh));
                    upsertStudy(c.fresh);
                } else {
                    c.oldRec.driftSeenAt = Date.now();
                    await idbPut('studies', c.oldRec);
                    upsertStudy(unpackStudy(c.oldRec, 'drift-kept'));
                }
            }

            async function resolveOneConflict(c, overwrite, itemEl) {
                await resolveConflict(c, overwrite);
                pendingConflicts = pendingConflicts.filter(x => x !== c);
                if (itemEl) itemEl.remove();
                renderDashboard();
                if (pendingConflicts.length === 0) {
                    els.conflictOverlay.style.display = 'none';
                    showToast('漂移核实完成', '✅');
                }
            }

            async function resolveAllConflicts(overwrite) {
                const list = pendingConflicts.slice();
                for (const c of list) await resolveConflict(c, overwrite);
                pendingConflicts = [];
                els.conflictOverlay.style.display = 'none';
                renderDashboard();
                showToast(overwrite ? '已全部覆盖为新版' : '已全部保留库中版本', '✅');
            }

            function showConflictModal(conflicts) {
                pendingConflicts = conflicts.slice();
                els.conflictBody.innerHTML = '';
                conflicts.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'conflict-item';
                    div.innerHTML = `
                        <div style="font-weight:700;">${h(c.fresh.name)} (${h(c.fresh.date)}) — ${h(c.fresh.path)}</div>
                        ${c.diffs.map(d => `<div class="diff-line">• ${h(d)}</div>`).join('')}
                        <div class="actions">
                            <button class="btn-action act-keep">保留库中版本</button>
                            <button class="btn-action btn-primary act-overwrite">覆盖为新版</button>
                        </div>`;
                    div.querySelector('.act-keep').onclick = () => resolveOneConflict(c, false, div);
                    div.querySelector('.act-overwrite').onclick = () => resolveOneConflict(c, true, div);
                    els.conflictBody.appendChild(div);
                });
                els.conflictOverlay.style.display = 'flex';
            }

            // ================================================================
            // 6. providers：把不同来源的输入统一为 [{file, path}] 再分组解析
            // ================================================================

            // 拖拽 entry 递归展开（webkitGetAsEntry）
            async function traverseEntry(entry, pathSoFar, out) {
                if (entry.isFile) {
                    try {
                        const f = await new Promise((res, rej) => entry.file(res, rej));
                        out.push({ file: f, path: pathSoFar + f.name });
                    } catch (e) { log(`Read Error: ${e.message}`); }
                } else if (entry.isDirectory) {
                    const reader = entry.createReader();
                    let entries = [];
                    let batch;
                    do {
                        batch = await new Promise(r => reader.readEntries(r));
                        entries = entries.concat(batch);
                    } while (batch.length > 0);

                    for (const child of entries) {
                        await traverseEntry(child, pathSoFar + entry.name + "/", out);
                    }
                }
            }

            // DataTransferItem / File 混合列表 → 扁平文件列表
            async function collectFiles(items) {
                const allFiles = [];
                try {
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        if (item.webkitGetAsEntry) {
                            // 拖拽（DataTransferItem）
                            const entry = item.webkitGetAsEntry();
                            if (entry) await traverseEntry(entry, "", allFiles);
                        } else {
                            // 按钮选择（File）
                            const f = (item instanceof File) ? item : (item.getAsFile ? item.getAsFile() : null);
                            if (f) {
                                allFiles.push({ file: f, path: f.webkitRelativePath || f.name });
                            }
                        }
                    }
                } catch (e) {
                    log(`Critical Scan Error: ${e.message}`);
                }
                return allFiles;
            }

            // 扁平文件列表 → 按目录分组的 study 候选 Map("folderKey" -> {entries, master, path})
            function groupFiles(allFiles) {
                const fileMap = new Map();

                for (const obj of allFiles) {
                    const name = obj.file.name.toLowerCase();
                    const fullPath = obj.path;

                    // Case 1: 顶层单 log 文件（路径用 Single/<文件名>，保证缓存 key 稳定）
                    if (name.endsWith('.log') && normalizePath(fullPath).toLowerCase() === name) {
                        const key = "Single_" + name + "_" + Math.random();
                        fileMap.set(key, { entries: obj.file, path: "Single/" + obj.file.name });
                        continue;
                    }

                    // Case 2: 目录结构（entries.log / MASTER 同目录配对）
                    if (name === 'entries.log' || name === 'master') {
                        const normPath = normalizePath(fullPath);
                        const lastSlash = normPath.lastIndexOf('/');
                        const folderPath = (lastSlash === -1) ? "Root" : normPath.substring(0, lastSlash);

                        if (!fileMap.has(folderPath)) fileMap.set(folderPath, {});
                        const group = fileMap.get(folderPath);
                        group.path = folderPath;
                        if (name === 'master') group.master = obj.file;
                        else group.entries = obj.file;
                    }
                }
                return fileMap;
            }

            // 统一入口：候选分组 → 解析 → 与缓存比对合入 → 更新 UI
            async function ingestFileMap(fileMap, allFiles) {
                log(`Found ${fileMap.size} potential study groups.`);

                const fresh = [];
                let filesUsedCount = 0;
                for (const [key, group] of fileMap) {
                    if (group.entries) {
                        try {
                            const study = await parseStudy(group.path || key, group.entries, group.master);
                            fresh.push(study);
                            filesUsedCount++;
                            if (group.master) filesUsedCount++;
                        } catch (e) { log(`Parse error ${key}: ${e.message}`); }
                    }
                }

                log(`Successfully parsed ${fresh.length} studies.`);

                const { conflicts } = await ingestStudies(fresh, 'import');
                setDashLoading(false);
                renderDashboard();

                if (fresh.length > 0) {
                    let msg = `完成！解析到 ${fresh.length} 个患者日志，共处理 ${filesUsedCount} 个有效文件。`;
                    if (conflicts.length) msg += `其中 ${conflicts.length} 个与缓存不一致，待核实。`;
                    showToast(msg, conflicts.length ? "⚠️" : "✅");

                    const missingMaster = Array.from(fileMap.values()).some(g => g.entries && !g.master);
                    if (missingMaster) {
                        log(`💡 提示：部分日志未识别到 MASTER 文件。若需显示患者姓名，请尝试【扫描文件夹】或同时选中 entries.log 与 MASTER 文件导入。`);
                    }
                }

                // 有数据后才显示搜索框
                const searchGroup = document.getElementById('dashSearchGroup');
                if (searchGroup) {
                    searchGroup.style.display = (appData.studies.length > 0) ? 'flex' : 'none';
                }

                if (fresh.length === 0) {
                    log("❌ No valid logs found. Ignored files list:");
                    allFiles.forEach(f => log(`  - [Ignored] Name: "${f.file.name}", Path: "${f.path}", Size: ${f.file.size}B`));

                    let logCount = 0, entCount = 0;
                    for (const obj of allFiles) {
                        const n = obj.file.name.toLowerCase();
                        if (n.endsWith('.log')) logCount++;
                        if (n === 'entries.log') entCount++;
                    }
                    log(`Stats: matches=.log(${logCount}), entries.log=${entCount}`);
                    alert("没有找到符合条件的日志文件。\n提示：请确保选择的文件夹中包含 'entries.log'。\n查看底部“诊断日志”以获取具体文件列表。");
                }
            }

            async function scanItems(items) {
                log(`Scan started. Items detected: ${items.length}`);
                setDashLoading(true, "Scanning & Flattening files...");

                const allFiles = await collectFiles(items);
                log(`Flattened to ${allFiles.length} files. Grouping...`);

                await ingestFileMap(groupFiles(allFiles), allFiles);
            }

            function handleFiles(fileList) {
                if (!fileList) return;
                // <input webkitdirectory> 的 fileList 已是递归展开的扁平列表，直接进管线
                scanItems(Array.from(fileList));
            }

            // ---------------- 运行模式检测与一键扫描 ----------------
            // flask: 经 Flask 服务打开，后端可全自动递归扫描服务器目录
            // fsapi: file:// 直开且支持 File System Access API（Chrome/Edge）
            // input: 兜底（Safari/Firefox），沿用导入按钮/拖拽
            let runMode = 'input';

            async function detectMode() {
                if (location.protocol === 'http:' || location.protocol === 'https:') {
                    try {
                        const r = await fetch('/api/load-prefs');
                        if (r.ok) return 'flask';
                    } catch (e) { /* 后端不可达，继续探测 */ }
                }
                if (typeof window.showDirectoryPicker === 'function') return 'fsapi';
                return 'input';
            }

            function updateModeUI() {
                const info = {
                    flask: ['本地服务', '经本地服务打开：一键扫描由后端自动递归数据目录'],
                    fsapi: ['浏览器直读', '双击直开：首次选择目录后，此后每次打开可一键重扫'],
                    input: ['兼容导入', '此浏览器不支持目录直读，请使用导入按钮或拖拽']
                };
                const m = info[runMode] || info.input;
                const state = document.getElementById('modeState');
                if (state) { state.textContent = m[0]; state.title = m[1]; }
                const ind = document.getElementById('modeIndicator');
                if (ind) ind.textContent = m[1];
                const btn = document.getElementById('btnAutoScan');
                if (btn) {
                    btn.style.display = (runMode === 'input') ? 'none' : 'flex';
                    btn.textContent = (runMode === 'flask') ? '一键扫描（服务器）' : '一键扫描';
                }
                const chg = document.getElementById('btnChangeRoot');
                if (chg) chg.style.display = (runMode === 'input') ? 'none' : 'flex';
            }

            async function autoScan(forceReselect) {
                if (runMode === 'flask') return flaskScan(forceReselect);
                if (runMode === 'fsapi') return fsapiScan(forceReselect);
                els.folderIn.click(); // input 模式兜底
            }

            // 扫描收尾（flask/fsapi 共用；导入管线 ingestFileMap 有自己的更详细反馈）
            function finishScanUI(freshCount, conflictCount) {
                const searchGroup = document.getElementById('dashSearchGroup');
                if (searchGroup) searchGroup.style.display = (appData.studies.length > 0) ? 'flex' : 'none';
                if (freshCount > 0) {
                    let msg = `扫描完成：${freshCount} 个患者日志。`;
                    if (conflictCount) msg += `其中 ${conflictCount} 个与缓存不一致，待核实。`;
                    showToast(msg, conflictCount ? '⚠️' : '✅');
                } else {
                    showToast('扫描完成，未发现 entries.log', '💡');
                }
            }

            // ---------------- Flask provider ----------------
            async function getFlaskRoot(forceReselect) {
                if (!forceReselect) {
                    try {
                        const prefs = await (await fetch('/api/load-prefs')).json();
                        if (prefs && prefs.workmate_scan_root) return prefs.workmate_scan_root;
                    } catch (e) { /* prefs 读不到就走选择器 */ }
                }
                const res = await (await fetch('/api/select-folder')).json();
                if (!res.path) return null;
                await fetch('/api/save-prefs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ workmate_scan_root: res.path })
                });
                return res.path;
            }

            function b64ToBuf(b64) {
                const bin = atob(b64);
                const u = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
                return u.buffer;
            }

            async function flaskScan(forceReselect) {
                let root;
                try {
                    root = await getFlaskRoot(forceReselect);
                } catch (e) {
                    log(`❌ 获取扫描目录失败: ${e.message}`);
                    return;
                }
                if (!root) { showToast('未选择扫描目录', '⚠️'); return; }

                setDashLoading(true, `服务器端扫描 ${root} ...`);
                log(`Flask 模式扫描: ${root}`);

                let body;
                try {
                    const resp = await fetch('/api/workmate/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ root: root })
                    });
                    body = await resp.json();
                    if (!resp.ok || body.status !== 'ok') throw new Error(body.message || `HTTP ${resp.status}`);
                } catch (e) {
                    setDashLoading(false);
                    renderDashboard();
                    log(`❌ 服务器扫描失败: ${e.message}`);
                    alert(`服务器扫描失败: ${e.message}`);
                    return;
                }

                if (body.truncated) {
                    // 截断必须让用户可见：toast + 展开诊断抽屉给出 skipped 明细
                    log(`⚠️ 扫描被截断（超出数量/大小/时间预算），结果可能不完整。`);
                    showToast('已部分扫描：超出数量/大小/时间上限，明细见诊断日志', '⚠️');
                    setConsoleOpen(true);
                }
                (body.skipped || []).forEach(k => log(`  - [Skipped] ${k.path} (${k.reason})`));
                log(`服务器返回 ${body.studies.length} 个 study（耗时 ${body.elapsed_ms}ms）`);

                const fresh = [];
                for (const st of body.studies) {
                    try {
                        const study = await parseStudy(
                            st.abs_path,
                            b64ToBuf(st.entries.b64),
                            st.master ? b64ToBuf(st.master.b64) : null);
                        fresh.push(study);
                    } catch (e) { log(`Parse error ${st.abs_path}: ${e.message}`); }
                }

                const { conflicts } = await ingestStudies(fresh, 'flask');
                setDashLoading(false);
                renderDashboard();
                finishScanUI(fresh.length, conflicts.length);
            }

            // ---------------- File System Access provider ----------------
            async function fsapiPickRoot() {
                const handle = await window.showDirectoryPicker({ mode: 'read' });
                await idbPut('handles', handle, 'scanRoot');
                return handle;
            }

            // 取回持久化的目录句柄并确保读权限（requestPermission 需在用户手势内）
            async function fsapiGetRoot() {
                let handle;
                try {
                    handle = await idbGet('handles', 'scanRoot');
                } catch (e) { return null; }
                if (!handle) return null;
                if (typeof handle.queryPermission === 'function') {
                    let p = await handle.queryPermission({ mode: 'read' });
                    if (p !== 'granted') p = await handle.requestPermission({ mode: 'read' });
                    if (p !== 'granted') return null;
                }
                return handle;
            }

            async function fsapiCollect(dirHandle, prefix, out, depth) {
                if (depth > 8) return; // 与后端 max_depth 对齐
                for await (const entry of dirHandle.values()) {
                    const name = entry.name.normalize('NFC'); // mac NFD 文件名规范化
                    if (name.startsWith('.') || name.startsWith('~')) continue;
                    if (entry.kind === 'file') {
                        const low = name.toLowerCase();
                        if (low === 'entries.log' || low === 'master') {
                            try {
                                out.push({ file: await entry.getFile(), path: prefix + name });
                            } catch (e) { log(`Read Error: ${prefix + name}: ${e.message}`); }
                        }
                    } else if (entry.kind === 'directory') {
                        await fsapiCollect(entry, prefix + name + '/', out, depth + 1);
                    }
                }
            }

            async function fsapiScan(forceReselect) {
                let handle = null;
                try {
                    if (forceReselect) {
                        handle = await fsapiPickRoot();
                    } else {
                        handle = await fsapiGetRoot();
                        if (!handle) handle = await fsapiPickRoot();
                    }
                } catch (e) {
                    if (e && e.name === 'AbortError') return; // 用户取消选择
                    log(`❌ 目录访问失败: ${e.message}`);
                    return;
                }
                if (!handle) return;

                setDashLoading(true, `扫描 ${handle.name} ...`);
                log(`浏览器直读模式扫描: ${handle.name}`);

                const files = [];
                try {
                    await fsapiCollect(handle, handle.name + '/', files, 0);
                } catch (e) {
                    // 句柄失效：目录被移动/重命名/删除
                    log(`❌ 扫描失败: ${e.message}，已清除失效句柄，请重新选择目录`);
                    await idbDelete('handles', 'scanRoot');
                    setDashLoading(false);
                    renderDashboard();
                    alert('目录访问失败（可能已移动或删除），请重新选择。');
                    return;
                }

                log(`发现 ${files.length} 个候选文件`);
                await ingestFileMap(groupFiles(files), files);
            }

            // ================================================================
            // 7. state
            // ================================================================
            const appData = {
                studies: [],
                activeStudy: null,
                dashFilter: "",
                contentFilter: "", // Deep Search
                detailRows: [],
                detailFilterRows: [],
                detailPage: 1,
                activeLogFilters: new Set(['PROTOCOL', 'EVENT', 'NOTE', 'PACE', 'RATE']),
                logSearch: "",
                detailSort: { key: 'ts', dir: 1 }, // 1: asc, -1: desc
                hitGroups: new Set(),
                onlyAnomalies: false
            };

            const els = {
                viewDash: document.getElementById('view-dashboard'),
                viewDetail: document.getElementById('view-detail'),
                countBadge: document.getElementById('countBadge'),
                navBread: document.getElementById('navBreadcrumb'),
                navCurrent: document.getElementById('navCurrent'),
                btnHome: document.getElementById('navHome'),

                fileIn: document.getElementById('fileInput'),
                folderIn: document.getElementById('folderInput'),

                dropZone: document.getElementById('dashDropZone'),
                btnSingle: document.getElementById('btnSingle'),
                btnScan: document.getElementById('btnScan'),
                dashSearch: document.getElementById('dashSearch'),
                contentSearch: document.getElementById('contentSearch'),
                dashBody: document.getElementById('dashBody'),
                statPatientCount: document.getElementById('statPatientCount'),
                statTimeRange: document.getElementById('statTimeRange'),

                logBody: document.getElementById('tableBody'),
                btnBack: document.getElementById('btnBack'),
                filterBar: document.getElementById('filterBar'),
                filterGroup: document.getElementById('filterGroup'),
                logSearch: document.getElementById('logSearch'),
                btnPagePrev: document.getElementById('btnPrev'),
                btnPageNext: document.getElementById('btnNext'),
                pageInfo: document.getElementById('pageInfo'),
                btnCsv: document.getElementById('btnCsv'),
                btnXls: document.getElementById('btnXls'),

                btnClearCache: document.getElementById('btnClearCache'),
                conflictOverlay: document.getElementById('conflictOverlay'),
                conflictBody: document.getElementById('conflictBody'),
                btnConflictKeepAll: document.getElementById('btnConflictKeepAll'),
                btnConflictOverwriteAll: document.getElementById('btnConflictOverwriteAll')
            };

            // ================================================================
            // 8. render
            // ================================================================
            function switchView(mode) {
                if (mode === 'dash') {
                    els.viewDash.style.display = 'flex';
                    els.viewDetail.style.display = 'none';
                    if (els.navBread) els.navBread.style.display = 'none';
                } else {
                    els.viewDash.style.display = 'none';
                    els.viewDetail.style.display = 'flex';
                }
            }

            function setDashLoading(isLoading, msg = "") {
                if (isLoading) {
                    els.dashBody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:50px;">
                <div style="font-weight:bold; color:var(--pulse);">处理中…（如有错误请查看下方诊断日志）</div>
                <div style="font-size:12px; color:var(--ink-soft); font-family:var(--mono);">${msg}</div>
            </td></tr>`;
                }
            }

            function filteredStudies() {
                let list = appData.studies;

                // 1. 元数据过滤
                if (appData.dashFilter) {
                    const q = appData.dashFilter;
                    list = list.filter(s =>
                        s.name.toLowerCase().includes(q) ||
                        s.pid.toLowerCase().includes(q) ||
                        s.date.includes(q)
                    );
                }

                // 2. 日志内容深搜过滤
                if (appData.contentFilter) {
                    const q = appData.contentFilter;
                    list = list.filter(s => s.rows.some(r => r.msg.toLowerCase().includes(q)));
                }
                return list;
            }

            function renderDashboard() {
                const list = filteredStudies();

                if (els.statPatientCount) els.statPatientCount.innerText = list.length;
                if (els.countBadge) els.countBadge.innerText = list.length;

                if (els.statTimeRange) {
                    // 此前用 length>=10 过滤，把 "2026/1/28" 这类未补零日期全部误滤掉了
                    const validDates = list.map(s => s.date)
                        .filter(d => d !== '-' && !isNaN(new Date(d).getTime()));
                    if (validDates.length > 0) {
                        validDates.sort((a, b) => new Date(a) - new Date(b));
                        const min = validDates[0];
                        const max = validDates[validDates.length - 1];
                        els.statTimeRange.innerText = (min === max) ? min : `${min} ~ ${max}`;
                    } else {
                        els.statTimeRange.innerText = "-";
                    }
                }

                els.dashBody.innerHTML = "";
                if (list.length === 0) {
                    els.dashBody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:30px;">无匹配记录</td></tr>`;
                    return;
                }

                list.forEach((s, i) => {
                    let matchInfo = "";
                    if (appData.contentFilter) {
                        const q = appData.contentFilter;
                        const matchCount = s.rows.filter(r => r.msg.toLowerCase().includes(q)).length;
                        matchInfo = `<div style="font-size:11px; color:#ef4444; font-weight:bold;">包含 ${matchCount} 条匹配</div>`;
                    }

                    const tr = document.createElement("tr");
                    tr.style.cursor = "pointer";
                    tr.onclick = () => loadStudyDetail(s.id);

                    tr.innerHTML = `
                        <td>${i + 1}</td>
                        <td style="font-weight:600; color:#0f172a;">${h(s.name)}${statusChips(s)}</td>
                        <td style="font-family:monospace;">${h(s.pid)}</td>
                        <td>${h(s.date)}</td>
                        <td>
                            <span class="badge-count">${s.rows.length}</span>
                            ${matchInfo}
                        </td>
                        <td>${timelineSVG(s, 140, 16)}</td>
                        <td style="color:var(--ink-soft); font-size:12px; font-family:var(--mono);">${h(s.path)}</td>
                        <td>
                            <div style="display:flex; gap:6px;">
                                <button class="btn-action btn-primary btn-view" style="padding:2px 8px; font-size:12px; height:auto;">查看</button>
                                <button class="btn-action btn-del" title="从列表与缓存中删除" style="padding:2px 8px; font-size:12px; height:auto;">✕</button>
                            </div>
                        </td>
                    `;
                    tr.querySelector(".btn-view").onclick = (e) => {
                        e.stopPropagation();
                        loadStudyDetail(s.id);
                    };
                    tr.querySelector(".btn-del").onclick = (e) => {
                        e.stopPropagation();
                        deleteStudy(s);
                    };

                    els.dashBody.appendChild(tr);
                });
            }

            // ---------------- 时间轴微条（signature） ----------------
            // 把 study 全部日志时间戳映射为细刻度：密度即手术节奏；
            // 时间异常处加高变色（倒退红 / 跳变·非法琥珀）。
            function timelineTicks(rows, w, h) {
                // 上下界与 detectTimeAnomalies 一致：一条损坏的未来时间戳
                // 会把 span 拉长几十年、正常刻度全被压扁
                const upperBound = Date.now() + 24 * 3600 * 1000;
                const valid = rows.filter(r => r.ts > TS_MIN_VALID && r.ts < upperBound);
                if (valid.length < 2) return null;
                let min = Infinity, max = -Infinity;
                for (const r of valid) {
                    if (r.ts < min) min = r.ts;
                    if (r.ts > max) max = r.ts;
                }
                const span = Math.max(1, max - min);
                // 采样护栏：普通刻度按步长抽稀，异常刻度全画
                const stride = Math.max(1, Math.ceil(valid.length / 400));
                let ticks = `<line x1="0" y1="${h / 2}" x2="${w}" y2="${h / 2}" stroke="var(--grid)" stroke-width="1"/>`;
                valid.forEach((r, i) => {
                    const flagged = r.flags && r.flags.length;
                    if (!flagged && i % stride !== 0) return;
                    const x = ((r.ts - min) / span * (w - 2) + 1).toFixed(1);
                    if (flagged) {
                        const color = r.flags.indexOf('ts_backward') !== -1 ? 'var(--alert)' : 'var(--warn)';
                        ticks += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="${color}" stroke-width="1.6"/>`;
                    } else {
                        ticks += `<line x1="${x}" y1="${(h * 0.25).toFixed(1)}" x2="${x}" y2="${(h * 0.75).toFixed(1)}" stroke="var(--pulse)" stroke-width="1" opacity="0.45"/>`;
                    }
                });
                return { ticks, min, max, span };
            }

            function timelineSVG(study, w, h) {
                const t = timelineTicks(study.rows, w, h);
