                if (!t) return `<svg class="timeline-strip" width="${w}" height="${h}"></svg>`;
                return `<svg class="timeline-strip" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${t.ticks}</svg>`;
            }

            // 明细视图放大版：宽度自适应，点击跳转到最近的日志行
            function renderDetailTimeline() {
                const cont = document.getElementById('detailTimeline');
                if (!cont) return;
                const W = 1000, H = 24;
                const t = timelineTicks(appData.detailRows, W, H);
                if (!t) {
                    cont.style.display = 'none';
                    return;
                }
                const fmt = ts => new Date(ts).toLocaleTimeString('en-GB', { hour12: false });
                cont.innerHTML =
                    `<svg class="timeline-strip clickable" width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${t.ticks}</svg>` +
                    `<div style="display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--ink-faint); margin-top:2px;">` +
                    `<span>${fmt(t.min)}</span><span>点击时间轴跳转到对应日志行</span><span>${fmt(t.max)}</span></div>`;
                cont.style.display = 'block';
                const svg = cont.querySelector('svg');
                svg.onclick = (e) => {
                    const rect = svg.getBoundingClientRect();
                    const frac = (e.clientX - rect.left) / Math.max(1, rect.width);
                    jumpToTs(t.min + frac * t.span);
                };
            }

            function jumpToTs(ts) {
                const rows = appData.detailFilterRows;
                if (!rows.length) return;
                let best = 0, bestD = Infinity;
                rows.forEach((r, i) => {
                    const d = Math.abs(r.ts - ts);
                    if (d < bestD) { bestD = d; best = i; }
                });
                appData.detailPage = Math.floor(best / PAGE_SIZE) + 1;
                renderLogTable();
                const tr = els.logBody.children[best % PAGE_SIZE];
                if (tr && tr.scrollIntoView) {
                    tr.scrollIntoView({ block: 'center' });
                    tr.style.outline = '2px solid var(--pulse)';
                    setTimeout(() => { tr.style.outline = ''; }, 1500);
                }
            }

            // study 状态徽标 + 时间异常徽标
            function statusChips(s) {
                const map = {
                    'new': ['新增', 'chip-new'],
                    'verified': ['已核实', 'chip-ok'],
                    'cached': ['缓存', 'chip-cache'],
                    'updated': ['已更新', 'chip-new'],
                    'drift': ['漂移待核实', 'chip-drift'],
                    'drift-kept': ['保留旧版', 'chip-warn']
                };
                const m = map[s.status];
                let out = m ? `<span class="chip ${m[1]}">${m[0]}</span>` : '';
                if (s.anomalies && s.anomalies.total > 0) {
                    const t = `倒退 ${s.anomalies.backward} · 跳变 ${s.anomalies.jump} · 非法 ${s.anomalies.invalid}`;
                    out += `<span class="chip chip-warn" title="${h(t)}">时间异常 ×${s.anomalies.total}</span>`;
                }
                return out;
            }

            async function deleteStudy(s) {
                if (!confirm(`删除「${s.name} (${s.date})」的缓存数据？`)) return;
                await idbDelete('studies', s.key);
                appData.studies = appData.studies.filter(x => x.id !== s.id);
                renderDashboard();
            }

            async function clearCache() {
                if (!confirm('清空内嵌数据库中的全部缓存数据？此操作不可恢复。')) return;
                await idbClear('studies');
                appData.studies = [];
                renderDashboard();
                showToast('缓存已清空', '🗑');
            }

            function loadStudyDetail(id) {
                try {
                    const study = appData.studies.find(s => s.id === id);
                    if (!study) {
                        console.error("Study not found for ID:", id);
                        return;
                    }

                    appData.activeStudy = study;
                    appData.detailRows = study.rows;

                    if (els.navBread) els.navBread.style.display = 'flex';
                    if (els.navCurrent) els.navCurrent.innerText = `${study.name} (${study.date})`;

                    // 进入新 study 重置过滤/排序
                    appData.activeLogFilters = new Set();
                    appData.detailSort = { key: 'ts', dir: 1 };
                    appData.onlyAnomalies = false;
                    study.rows.forEach(r => {
                        if (!DEFAULT_HIDDEN.has(r.group)) appData.activeLogFilters.add(r.group);
                    });

                    // 深搜关键词透传到明细视图
                    appData.hitGroups = new Set();
                    if (appData.contentFilter) {
                        const q = appData.contentFilter;
                        appData.logSearch = q;
                        if (els.logSearch) els.logSearch.value = q;

                        // 隐藏分组中有命中时强制显示该分组
                        study.rows.forEach(r => {
                            if (r.msg.toLowerCase().includes(q)) {
                                if (!appData.activeLogFilters.has(r.group)) {
                                    appData.activeLogFilters.add(r.group);
                                    appData.hitGroups.add(r.group);
                                }
                            }
                        });

                        if (appData.hitGroups.size > 0) {
                            showToast(`搜索关键词命中并展开了隐藏分组: ${Array.from(appData.hitGroups).join(', ')}`, "🔎");
                        }
                    } else {
                        appData.logSearch = "";
                        if (els.logSearch) els.logSearch.value = "";
                    }

                    renderFilterBar();
                    switchView('detail');
                    appData.detailPage = 1;
                    applyDetailFilters();
                    renderDetailTimeline();
                } catch (e) {
                    console.error("Error loading detail:", e);
                    alert("加载详情失败: " + e.message);
                }
            }

            function renderFilterBar() {
                const groups = new Set(appData.detailRows.map(r => r.group));
                if (els.filterGroup) els.filterGroup.innerHTML = "";

                groups.forEach(g => {
                    const isChecked = appData.activeLogFilters.has(g);
                    const isHit = appData.hitGroups && appData.hitGroups.has(g);

                    const label = document.createElement('label');
                    label.className = `checkbox-wrapper ${isChecked ? 'active' : ''} ${isHit ? 'hit' : ''}`;
                    label.innerHTML = `<input type="checkbox" ${isChecked ? 'checked' : ''}> ${h(g)}${isHit ? ' (Match)' : ''}`;
                    label.querySelector('input').onchange = (e) => {
                        if (e.target.checked) {
                            appData.activeLogFilters.add(g);
                            label.classList.add('active');
                        } else {
                            appData.activeLogFilters.delete(g);
                            label.classList.remove('active');
                        }
                        appData.detailPage = 1;
                        applyDetailFilters();
                    };
                    if (els.filterGroup) els.filterGroup.appendChild(label);
                });

                // 「仅看异常」开关（有异常行时才出现）
                const anomalyCount = appData.detailRows.filter(r => r.flags && r.flags.length).length;
                if (anomalyCount > 0 && els.filterGroup) {
                    const label = document.createElement('label');
                    label.className = `checkbox-wrapper ${appData.onlyAnomalies ? 'hit' : ''}`;
                    label.title = `判据：倒退>${TS_BACKWARD_MS / 1000}s / 跳变>${TS_JUMP_MS / 3600000}h 或跨日 / 非法时间戳`;
                    label.innerHTML = `<input type="checkbox" ${appData.onlyAnomalies ? 'checked' : ''}> ⚠ 仅看时间异常 (${anomalyCount})`;
                    label.querySelector('input').onchange = (e) => {
                        appData.onlyAnomalies = e.target.checked;
                        appData.detailPage = 1;
                        applyDetailFilters();
                        renderFilterBar();
                    };
                    els.filterGroup.appendChild(label);
                }

                if (els.filterBar) els.filterBar.style.display = 'flex';
            }

            function applyDetailFilters() {
                const q = appData.logSearch;
                const filtered = appData.detailRows.filter(r => {
                    if (!appData.activeLogFilters.has(r.group)) return false;
                    if (appData.onlyAnomalies && !(r.flags && r.flags.length)) return false;
                    if (q && !r.msg.toLowerCase().includes(q)) return false;
                    return true;
                });

                const { key, dir } = appData.detailSort;
                filtered.sort((a, b) => {
                    const valA = a[key];
                    const valB = b[key];
                    if (typeof valA === 'string') {
                        return valA.localeCompare(valB) * dir;
                    }
                    return (valA - valB) * dir;
                });

                appData.detailFilterRows = filtered;
                updateSortUI();
                renderLogTable();
            }

            function handleDetailSort(key) {
                if (appData.detailSort.key === key) {
                    appData.detailSort.dir *= -1;
                } else {
                    appData.detailSort.key = key;
                    appData.detailSort.dir = 1;
                }
                applyDetailFilters();
            }

            function updateSortUI() {
                document.querySelectorAll('th.sortable').forEach(th => {
                    th.classList.remove('asc', 'desc');
                });
                const { key, dir } = appData.detailSort;
                const target = document.querySelector(`th.sortable[data-sort="${key}"]`);
                if (target) {
                    target.classList.add(dir === 1 ? 'asc' : 'desc');
                }
            }

            function renderLogTable() {
                const start = (appData.detailPage - 1) * PAGE_SIZE;
                const pageData = appData.detailFilterRows.slice(start, start + PAGE_SIZE);
                const totalPages = Math.ceil(appData.detailFilterRows.length / PAGE_SIZE) || 1;

                if (els.pageInfo) els.pageInfo.innerText = `Page ${appData.detailPage} / ${totalPages} (Total: ${appData.detailFilterRows.length})`;
                if (els.countBadge) els.countBadge.innerText = appData.detailFilterRows.length;

                els.logBody.innerHTML = "";
                if (pageData.length === 0) {
                    els.logBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px;">无日志显示</td></tr>`;
                    return;
                }

                pageData.forEach((r, i) => {
                    const tr = document.createElement("tr");
                    const flagged = r.flags && r.flags.length;
                    if (flagged) {
                        tr.className = 'row-warn';
                        tr.title = `时间异常: ${r.flags.join(', ')}`;
                    }
                    tr.innerHTML = `
                        <td class="col-idx">${start + i + 1}</td>
                        <td class="col-time">${flagged ? '⚠ ' : ''}${h(r.timeStr)}</td>
                        <td class="col-group"><span class="tag tag-${h(r.group)}">${h(r.group)}</span></td>
                        <td class="col-msg">${h(r.msg)}</td>
                    `;
                    els.logBody.appendChild(tr);
                });

                if (els.btnPagePrev) els.btnPagePrev.disabled = appData.detailPage <= 1;
                if (els.btnPageNext) els.btnPageNext.disabled = appData.detailPage >= totalPages;
            }

            function changeLogPage(delta) {
                const totalPages = Math.ceil(appData.detailFilterRows.length / PAGE_SIZE) || 1;
                const next = appData.detailPage + delta;
                if (next >= 1 && next <= totalPages) {
                    appData.detailPage = next;
                    renderLogTable();
                }
            }

            // ================================================================
            // 9. export
            // ================================================================
            function triggerDL(content, name, mime) {
                const blob = new Blob([content], { type: `${mime};charset=utf-8;` });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            function downloadCurrentLog() {
                if (!appData.activeStudy) return;
                let csv = "\uFEFFTime,Group,Message\n";
                appData.detailFilterRows.forEach(r => csv += `${r.timeStr},${r.group},"${r.msg.replace(/"/g, '""')}"\n`);
                triggerDL(csv, `${appData.activeStudy.name}_${appData.activeStudy.date}.csv`, 'text/csv');
            }

            function downloadCurrentXls() {
                if (!appData.activeStudy) return;
                const rows = appData.detailFilterRows.map((r, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${h(r.timeStr)}</td>
                        <td>${h(r.group)}</td>
                        <td>${h(r.msg)}</td>
                    </tr>
                `).join('');

                const tpl = `
                    <html xmlns:x="urn:schemas-microsoft-com:office:excel">
                    <head><meta charset="UTF-8"></head>
                    <body>
                        <table border="1">
                            <thead>
                                <tr style="background:#ddd;">
                                    <th>Index</th><th>Time</th><th>Group</th><th>Message</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </body>
                    </html>`;

                triggerDL(tpl, `${appData.activeStudy.name}_${appData.activeStudy.date}.xls`, 'application/vnd.ms-excel');
            }

            // ================================================================
            // 10. boot（事件绑定 + 存储初始化）
            // ================================================================
            function boot() {
                if (els.btnSingle) els.btnSingle.onclick = () => els.fileIn.click();
                if (els.btnScan) els.btnScan.onclick = () => els.folderIn.click();
                if (els.btnHome) els.btnHome.onclick = () => switchView('dash');
                if (els.btnBack) els.btnBack.onclick = () => switchView('dash');

                if (els.fileIn) els.fileIn.onchange = (e) => handleFiles(e.target.files);
                if (els.folderIn) els.folderIn.onchange = (e) => handleFiles(e.target.files);

                if (els.logSearch) {
                    els.logSearch.addEventListener('input', (e) => {
                        appData.logSearch = e.target.value.toLowerCase();
                        appData.detailPage = 1;
                        applyDetailFilters();
                    });
                }

                if (els.btnPagePrev) els.btnPagePrev.onclick = () => changeLogPage(-1);
                if (els.btnPageNext) els.btnPageNext.onclick = () => changeLogPage(1);
                if (els.btnCsv) els.btnCsv.onclick = downloadCurrentLog;
                if (els.btnXls) els.btnXls.onclick = downloadCurrentXls;

                if (els.dashSearch) {
                    els.dashSearch.addEventListener('input', (e) => {
                        appData.dashFilter = e.target.value.toLowerCase();
                        renderDashboard();
                    });
                }

                if (els.contentSearch) {
                    els.contentSearch.addEventListener('input', debounce((e) => {
                        appData.contentFilter = e.target.value.toLowerCase();
                        renderDashboard();
                    }, 300));
                }

                // 明细表头排序（替代此前的内联 onclick）
                document.querySelectorAll('#dataTable th.sortable').forEach(th => {
                    th.addEventListener('click', () => handleDetailSort(th.dataset.sort));
                });

                // 拖拽导入
                if (els.dropZone) {
                    els.dropZone.addEventListener('dragover', e => { e.preventDefault(); els.dropZone.style.background = 'var(--pulse-soft)'; });
                    els.dropZone.addEventListener('dragleave', e => { e.preventDefault(); els.dropZone.style.background = ''; });
                    els.dropZone.addEventListener('drop', e => {
                        e.preventDefault();
                        e.stopPropagation(); // 不再冒泡到 window 级兜底，避免重复扫描
                        els.dropZone.style.background = '';
                        if (e.dataTransfer.items) scanItems(e.dataTransfer.items);
                    });
                }

                // 窗口级兜底：空态文案引导"拖入此窗口"，拖到表格等其他区域
                // 松手时若无此护栏，浏览器会直接导航到被拖文件、丢失页面状态
                window.addEventListener('dragover', e => { e.preventDefault(); });
                window.addEventListener('drop', e => {
                    e.preventDefault();
                    if (e.dataTransfer && e.dataTransfer.items && e.dataTransfer.items.length) {
                        scanItems(e.dataTransfer.items);
                    }
                });

                // 缓存管理与漂移弹层
                if (els.btnClearCache) els.btnClearCache.onclick = clearCache;
                if (els.btnConflictKeepAll) els.btnConflictKeepAll.onclick = () => resolveAllConflicts(false);
                if (els.btnConflictOverwriteAll) els.btnConflictOverwriteAll.onclick = () => resolveAllConflicts(true);

                // 一键扫描（flask/fsapi 模式）
                const btnAutoScan = document.getElementById('btnAutoScan');
                const btnChangeRoot = document.getElementById('btnChangeRoot');
                if (btnAutoScan) btnAutoScan.onclick = () => autoScan(false);
                if (btnChangeRoot) btnChangeRoot.onclick = () => autoScan(true);

                // 诊断抽屉
                const consoleToggle = document.getElementById('consoleToggle');
                if (consoleToggle) consoleToggle.onclick = () => {
                    const drawer = document.getElementById('consoleDrawer');
                    setConsoleOpen(drawer && !drawer.classList.contains('open'));
                };
                const btnConsoleClear = document.getElementById('btnConsoleClear');
                if (btnConsoleClear) btnConsoleClear.onclick = () => {
                    const el = document.getElementById('sysLog');
                    if (el) el.innerText = 'Ready.';
                };

                // 打开内嵌数据库并恢复缓存（异步，不阻塞首屏）
                initStorage();

                // 探测运行模式并更新按钮/提示
                detectMode().then(m => { runMode = m; updateModeUI(); });
            }

            boot();
        </script>
</body>

</html>
